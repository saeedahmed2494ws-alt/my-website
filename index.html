<!DOCTYPE html>
<html>
<head>
  <title>My Pro Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    /* Navbar */
    .navbar {
      background: black;
      padding: 15px;
      text-align: center;
    }

    .navbar a {
      color: white;
      margin: 15px;
      text-decoration: none;
      font-size: 18px;
    }

    .navbar a:hover {
      color: yellow;
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      text-align: center;
      padding: 80px 20px;
    }

    img {
      width: 120px;
      border-radius: 50%;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>

  <!-- Hero Section -->
  <div class="hero">
    <h1>🚀 My Pro Website</h1>
    <p>I am learning web development 😎</p>

    <img src="https://via.placeholder.com/120" alt="profile">
  </div>

</body>
</html>
