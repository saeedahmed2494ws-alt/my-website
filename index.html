<!DOCTYPE html>
<html>
<head>
<title>My Casino</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}

.header {
  background: black;
  padding: 15px;
  font-size: 20px;
}

.balance {
  background: green;
  padding: 5px 10px;
  border-radius: 10px;
  margin-left: 10px;
}

.games {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 20px;
}

.card {
  background: #222;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
🎰 My Casino <span class="balance">Rs 100</span>
</div>

<div class="games">

<div class="card" onclick="play()">
<img src="https://via.placeholder.com/150">
<h3>🎲 Lucky Game</h3>
</div>

<div class="card" onclick="play()">
<img src="https://via.placeholder.com/150">
<h3>🚀 Aviator</h3>
</div>

<div class="card" onclick="play()">
<img src="https://via.placeholder.com/150">
<h3>💰 Spin Wheel</h3>
</div>

<div class="card" onclick="play()">
<img src="https://via.placeholder.com/150">
<h3>🐯 Tiger Game</h3>
</div>

</div>

<script>
let balance = 100;

function play() {
  if(balance < 10){
    alert("No money!");
    return;
  }

  balance -= 10;

  if(Math.random() < 0.5){
    balance += 20;
    alert("🎉 You Win!");
  } else {
    alert("😢 You Lose!");
  }

  document.querySelector(".balance").innerText = "Rs " + balance;
}
</script>

</body>
</html>
