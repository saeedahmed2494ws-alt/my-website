<!DOCTYPE html>
<html>
<head>
  <title>My Ultimate Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .navbar {
      background: black;
      padding: 15px;
      text-align: center;
    }

    .navbar a {
      color: white;
      margin: 15px;
      text-decoration: none;
      transition: 0.3s;
    }

    .navbar a:hover {
      color: yellow;
    }

    .section {
      padding: 60px;
      text-align: center;
    }

    .hero {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      animation: fadeIn 2s;
    }

    img {
      width: 120px;
      border-radius: 50%;
      margin-top: 20px;
    }

    .card {
      background: #f4f4f4;
      margin: 20px auto;
      padding: 20px;
      width: 80%;
      border-radius: 10px;
      box-shadow: 0px 0px 10px gray;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    /* WhatsApp Button */
    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: green;
      color: white;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
      font-size: 20px;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>

<body>

<div class="navbar">
  <a href="#">Home</a>
  <a href="#about">About</a>
  <a href="#contact">Contact</a>
</div>

<div class="section hero">
  <h1>🚀 My Ultimate Portfolio</h1>
  <p>I am a professional web developer 😎</p>
  <img src="https://via.placeholder.com/120">
</div>

<div id="about" class="section">
  <h2>About Me</h2>
  <div class="card">
    <p>I create modern websites using HTML, CSS & animations.</p>
  </div>
</div>

<div id="contact" class="section">
  <h2>Contact</h2>
  <div class="card">
    <p>Email: your@email.com</p>
  </div>
</div>

<!-- WhatsApp Button -->
<a class="whatsapp" href="https://wa.me/923017372553">💬</a>

</body>
</html>
