<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .navbar {
      background: black;
      padding: 15px;
      text-align: center;
    }

    .navbar a {
      color: white;
      margin: 15px;
      text-decoration: none;
    }

    .section {
      padding: 50px;
      text-align: center;
    }

    .hero {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
    }

    .card {
      background: #f4f4f4;
      margin: 20px auto;
      padding: 20px;
      width: 80%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="navbar">
  <a href="#">Home</a>
  <a href="#about">About</a>
  <a href="#contact">Contact</a>
</div>

<div class="section hero">
  <h1>🚀 My Portfolio</h1>
  <p>I am a web developer 😎</p>
</div>

<div id="about" class="section">
  <h2>About Me</h2>
  <div class="card">
    <p>I create websites using HTML & CSS.</p>
  </div>
</div>

<div id="contact" class="section">
  <h2>Contact</h2>
  <div class="card">
    <p>Email: your@email.com</p>
  </div>
</div>

</body>
</html>
