<!DOCTYPE html>
<html>
<head>
<title>Aviator</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

h1 { color: red; }

button {
  padding: 10px 20px;
  background: green;
  border: none;
  color: white;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🚀 Aviator</h1>
<h2 id="multi">1.00x</h2>

<button onclick="start()">Start</button>
<button onclick="cashout()">Cashout</button>

<script>
let value = 1;
let running = false;
let interval;

function start(){
  value = 1;
  running = true;

  interval = setInterval(()=>{
    value += 0.1;
    document.getElementById("multi").innerText = value.toFixed(2) + "x";

    if(Math.random() < 0.05){
      clearInterval(interval);
      running = false;
      alert("💥 Crashed!");
    }

  },200);
}

function cashout(){
  if(running){
    alert("💰 You cashed at " + value.toFixed(2) + "x");
    clearInterval(interval);
    running = false;
  }
}
</script>

</body>
</html>
