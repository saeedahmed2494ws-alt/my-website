<!DOCTYPE html>
<html>
<head>
  <title>My Cool Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      font-size: 40px;
    }

    p {
      font-size: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #333;
      cursor: pointer;
    }

    button:hover {
      background: yellow;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚀 Welcome to My Website</h1>
    <p>This is my awesome GitHub Pages site 😎</p>
    
    <button onclick="showMessage()">Click Me</button>
  </div>

  <script>
    function showMessage() {
      alert("🔥 You clicked the button!");
    }
  </script>
</body>
</html>
