<!DOCTYPE html>
<html>
<head>
<title>Aviator Game</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

h1 {
  color: red;
}

button {
  padding: 10px 20px;
  background: green;
  border: none;
  color: white;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🚀 Aviator</h1>
<h2 id="multiplier">1.00x</h2>

<button onclick="startGame()">Start</button>

<script>
let interval;

function startGame() {
  let value = 1.00;

  clearInterval(interval);

  interval = setInterval(() => {
    value += 0.1;
    document.getElementById("multiplier").innerText = value.toFixed(2) + "x";

    if(Math.random() < 0.05){
      clearInterval(interval);
      alert("💥 Crashed at " + value.toFixed(2) + "x");
    }

  }, 200);
}
</script>

</body>
</html>
