<!DOCTYPE html>
<html>
<head>
<title>Spin Wheel</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
}

button {
  padding: 10px 20px;
  background: green;
  border: none;
  color: white;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🎡 Spin Wheel</h1>
<h2 id="result">Click Spin</h2>

<button onclick="spin()">Spin</button>

<script>
function spin(){
  let rewards = [0, 10, 20, 50, 100];
  let win = rewards[Math.floor(Math.random()*rewards.length)];

  document.getElementById("result").innerText = "You won Rs " + win;
}
</script>

</body>
</html>
